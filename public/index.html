<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HappySalary - Redirecting...</title>
  <script>
    var lang = (navigator.language || navigator.userLanguage || 'fr').substring(0, 2);
    var supported = ['fr', 'de', 'en'];
    var locale = supported.includes(lang) ? lang : 'fr';
    window.location.replace('/' + locale);
  </script>
  <meta http-equiv="refresh" content="0;url=/fr">
</head>
<body>
  <p>Redirecting to <a href="/fr">HappySalary</a>...</p>
</body>
</html>
